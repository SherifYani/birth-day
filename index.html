<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday!</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Background Elements -->
    <div class="bg-gradient"></div>
    <canvas id="snow-canvas"></canvas>
    <canvas id="confetti-canvas"></canvas>

    <!-- Loader / Start Screen -->
    <div id="loader" class="loader">
        <div class="loader-card">
            <div class="loader-icon">🎁</div>
            <h1>A Special Surprise...</h1>
            <p>Ready to celebrate?</p>
            <button id="start-btn" class="btn-primary">
                <span>Start Celebration</span>
                <i class="fas fa-play"></i>
            </button>
        </div>
    </div>

    <!-- Main Content -->
    <main id="main-content" class="hidden">
        <!-- Music Control -->
        <div class="controls-top">
            <button id="music-toggle" class="control-btn" title="Toggle Music">
                <i class="fas fa-volume-up"></i>
            </button>
            <button id="replay-btn" class="control-btn" title="Replay Animation">
                <i class="fas fa-redo"></i>
            </button>
        </div>

        <div class="container">
            <!-- Balloon Border (Enhanced) -->
            <div class="balloon-container" id="balloon-container">
                <!-- Balloons will be injected here via JS or kept as image if preferred -->
                <img src="img/Balloon-Border.png" alt="" class="balloon-border-img">
            </div>

            <div class="glass-panel">
                <div class="banner-wrapper">
                    <img src="img/banner.png" alt="Happy Birthday Banner" class="birthday-banner">
                </div>

                <div class="greeting-content">
                    <h1 id="display-name" class="name-text">Santos</h1>
                    
                    <div class="typing-container">
                        <div id="typed-strings" style="display: none;">
                            <p>Wishing you a day filled with love and laughter! 🎂</p>
                            <p>May all your dreams and wishes come true. ✨</p>
                            <p>You deserve the best birthday ever! 🎈</p>
                            <p>Cheers to another amazing year! 🥂</p>
                        </div>
                        <span id="typed-text"></span>
                    </div>

                    <div class="cake-wrapper">
                        <img src="img/cake.gif" alt="Birthday Cake" class="cake-img">
                    </div>
                </div>

                <!-- Share Section (Hidden until finished) -->
                <div id="share-section" class="share-section hidden">
                    <button id="copy-link-btn" class="btn-secondary">
                        <i class="fas fa-link"></i>
                        <span>Copy Personalized Link</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- Name Input Fallback (If no name in URL) -->
        <div id="name-modal" class="modal hidden">
            <div class="modal-content glass-panel">
                <h2>Who are we celebrating?</h2>
                <div class="input-group">
                    <input type="text" id="name-input" placeholder="Enter name..." maxlength="20">
                    <button id="save-name-btn" class="btn-primary">Go!</button>
                </div>
            </div>
        </div>
    </main>

    <!-- Audio -->
    <audio id="birthday-song" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <!-- Toast Notification -->
    <div id="toast" class="toast hidden">Link copied to clipboard! 📋</div>

    <!-- Scripts -->
    <script src="js/typed.min.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
